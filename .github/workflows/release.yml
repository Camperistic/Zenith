name: Package and release

# Tag a release (e.g. `v1.0.0`) to build and publish the addon.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    # Let the packager create/update the GitHub release for the tag.
    permissions:
      contents: write
    steps:
      - name: Clone project
        uses: actions/checkout@v4

      # Build the package + create the GitHub release (and CurseForge / WoWInterface
      # if those secrets are set). This is the reliable part of the release.
      - name: Package & GitHub release
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}        # CurseForge (optional)
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }} # WoWInterface (optional)
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}     # provided automatically
        with:
          args: -g bcc

      # Upload to Wago separately and allow it to fail: the Wago API occasionally
      # returns transient 403s, and a hiccup there must not fail the whole release
      # (the GitHub release above already published).
      - name: Upload to Wago (non-blocking)
        continue-on-error: true
        uses: BigWigsMods/packager@v2
        env:
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }} # Wago
        with:
          args: -g bcc
