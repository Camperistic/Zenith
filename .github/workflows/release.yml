name: Package and release

# Tag a release (e.g. `v0.2.0`) to build and (optionally) publish the addon.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4

      - name: Package and release
        uses: BigWigsMods/packager@v2
        # Add these repo secrets to publish automatically; without them the
        # action still builds and attaches a zip to the GitHub release.
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}        # CurseForge
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }} # WoWInterface
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }} # Wago
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}     # provided automatically
        with:
          args: -g bcc
